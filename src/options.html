<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Retro Web — Options</title>
    <link rel="stylesheet" href="win95.css" />
    <style>
      body {
        max-width: 560px;
        margin: 40px auto;
        padding: 0 16px;
        background: #008080;
        font: 14px "MS Sans Serif", Arial, sans-serif;
      }
      .body {
        padding: 16px;
      }
      label {
        display: block;
        font-weight: bold;
        margin: 14px 0 4px;
      }
      input,
      select {
        width: 100%;
        padding: 6px;
        font: 13px monospace;
        box-sizing: border-box;
      }
      .hint {
        font-size: 12px;
        color: #404040;
        margin-top: 4px;
      }
      button {
        margin-top: 18px;
        padding: 8px 24px;
      }
      #saved {
        margin-left: 12px;
        color: #008000;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="win95-window">
      <div class="win95-titlebar">🌐 Retro Web — Control Panel</div>
      <div class="body">
        <label for="apiKey">Anthropic API key</label>
        <input id="apiKey" class="win95-field" type="password" placeholder="sk-ant-..." />
        <div class="hint">
          Stored locally in this browser only (chrome.storage.local). Get a key at
          platform.claude.com. Calls go directly from your browser to the
          Anthropic API — there is no middleman server.
        </div>

        <label for="model">Model</label>
        <select id="model" class="win95-field">
          <option value="claude-opus-4-8">Claude Opus 4.8 — best (≈ $0.15/page)</option>
          <option value="claude-sonnet-4-6">Claude Sonnet 4.6 — balanced (≈ $0.09/page)</option>
          <option value="claude-haiku-4-5">Claude Haiku 4.5 — fast &amp; cheap (≈ $0.03/page)</option>
        </select>
        <div class="hint">Results are cached per URL per model, so revisits are free.</div>

        <button id="save">Save</button><span id="saved"></span>
        <button id="clearCache">Clear page cache</button>
      </div>
    </div>
    <script src="constants.js"></script>
    <script src="options.js"></script>
  </body>
</html>
